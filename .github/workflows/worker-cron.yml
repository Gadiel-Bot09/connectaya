name: Campaign Worker Queue

on:
  schedule:
    # Runs every 5 minutes — each run loops for the full window processing messages
    - cron: '*/5 * * * *'
  workflow_dispatch: # Manual trigger from GitHub Actions tab

jobs:
  process-campaign-queue:
    runs-on: ubuntu-latest
    # Allow the job to run for up to 30 minutes per cycle
    timeout-minutes: 30

    steps:
      - name: Process campaign messages with anti-spam delays
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          echo "🚀 ConnectaYa Worker — $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Worker URL: ${WORKER_URL}"

          # ---------------------------------------------------------------
          # STRATEGY: Call the stateless /api/worker endpoint repeatedly.
          # The API now calculates and returns the EXACT delay needed
          # based on the user's campaign configuration (next_delay_sec).
          # We loop for a maximum of 4 minutes (240s) to guarantee we
          # cleanly exit before the next 5-minute cron starts!
          # ---------------------------------------------------------------

          MAX_TIME=240          # 4 minutes max per cron run to avoid overlap
          START_TIME=$(date +%s)
          CALLS_MADE=0
          STOP=false

          while [ "$STOP" = "false" ]; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            
            if [ $ELAPSED -ge $MAX_TIME ]; then
              echo "⏱️ Reached 4-minute execution limit. Stopping cleanly to yield to next cron run."
              break
            fi

            echo ""
            echo "📨 Call $((CALLS_MADE + 1)) — Invoking worker (Elapsed: ${ELAPSED}s / ${MAX_TIME}s)..."

            RESPONSE=$(curl -sS --max-time 30 \
              -w "\n__HTTP_STATUS_%{http_code}__" \
              "$WORKER_URL/api/worker")

            HTTP_CODE=$(echo "$RESPONSE" | grep -o '__HTTP_STATUS_[0-9]*__' | grep -o '[0-9]*')
            BODY=$(echo "$RESPONSE" | sed 's/__HTTP_STATUS_[0-9]*__//')

            echo "   HTTP Status: $HTTP_CODE"
            echo "   Response:    $BODY"

            # Stop conditions
            if echo "$BODY" | grep -q '"No active campaigns"'; then
              echo "✅ No active campaigns. Worker done."
              STOP=true
              break
            fi

            if echo "$BODY" | grep -q '"done":true'; then
              echo "✅ Campaign completed! Worker done."
              STOP=true
              break
            fi

            if echo "$BODY" | grep -q '"Outside of allowed hours"'; then
              echo "🌙 Outside sending hours. Stopping."
              STOP=true
              break
            fi

            if echo "$BODY" | grep -q '"Instance is not connected"'; then
              echo "❌ WhatsApp instance disconnected. Stopping."
              STOP=true
              break
            fi

            if [ "$HTTP_CODE" != "200" ]; then
              echo "⚠️  Unexpected HTTP $HTTP_CODE. Stopping loop."
              STOP=true
              break
            fi

            CALLS_MADE=$((CALLS_MADE + 1))

            if [ "$STOP" = "false" ]; then
              # Extract the exact delay requested by the campaign config
              NEXT_DELAY=$(echo "$BODY" | grep -o '"next_delay_sec":[0-9]*' | cut -d: -f2)
              if [ -z "$NEXT_DELAY" ]; then NEXT_DELAY=10; fi
              
              echo "   ⏳ Campaign requested delay: ${NEXT_DELAY} seconds..."
              sleep $NEXT_DELAY
            fi

          done

          echo ""
          echo "🏁 Worker cycle complete. Messages sent this run: $CALLS_MADE"
